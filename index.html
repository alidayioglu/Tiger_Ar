<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Sticker Deneyimi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      
      /* AR Başlangıç Ekranı (Video izni almak için zorunlu) */
      #start-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.9); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }
      #start-btn {
        padding: 20px 40px; font-size: 20px; font-weight: bold; color: white;
        background-color: #007aff; border: none; border-radius: 30px; cursor: pointer;
        box-shadow: 0px 4px 15px rgba(0, 122, 255, 0.5);
      }
    </style>
  </head>
  <body>
    
    <div id="start-screen">
      <button id="start-btn">Kamerayı Aç ve Başla</button>
      <p style="color:white; margin-top:20px; font-size:14px;">(Lütfen tarayıcının kamera iznine onay verin)</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.0001; missTolerance: 5;" color-space="sRGB" renderer="colorManagement: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid-android" src="animasyon.webm" preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid-ios" src="animasyonios.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="hedef-sticker">
        <a-video id="ar-plane" src="#vid-android" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        
        // 1. Cihaz Tespiti
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const isApple = isIOS || isSafari;

        const arPlane = document.querySelector('#ar-plane');
        let targetVideo = document.querySelector('#vid-android');

        // Apple cihazsa MP4'e geç
        if (isApple) {
            arPlane.setAttribute('src', '#vid-ios');
            targetVideo = document.querySelector('#vid-ios');
        }

        // 2. Başlat Butonu (Video otomatik oynatma kilidini açar)
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');

        startBtn.addEventListener('click', () => {
          startScreen.style.display = 'none';
          targetVideo.play().then(() => {
            targetVideo.pause();
          }).catch(e => console.log("Video izni hatası:", e));
        });

        // 3. Sticker Takibi
        const hedef = document.querySelector('#hedef-sticker');
        hedef.addEventListener("targetFound", event => { 
            targetVideo.play(); 
        });
        hedef.addEventListener("targetLost", event => { 
            targetVideo.pause(); 
        });

      });
    </script>
  </body>
</html>
