<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Sticker Deneyimi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      /* Kayıt Butonu Tasarımı */
      #ui-container {
        position: absolute; bottom: 30px; left: 0; width: 100%; 
        display: flex; justify-content: center; z-index: 1000; pointer-events: none;
      }
      #record-btn {
        pointer-events: auto; padding: 15px 30px; background-color: #ff3b30; 
        color: white; border: none; border-radius: 30px; font-size: 16px; 
        font-weight: bold; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); cursor: pointer;
        transition: background-color 0.3s;
      }
    </style>
  </head>
  <body>
    
    <div id="ui-container">
      <button id="record-btn">🔴 Kayda Başla</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 0.0001; missTolerance: 5;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="animasyon.webm" preload="auto" loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="hedef-sticker">
        <a-video src="#ar-video" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const hedef = document.querySelector('#hedef-sticker');
        const video = document.querySelector('#ar-video');
        
        // Cihaz Kontrolü
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isMacSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        // Apple cihaz algılanırsa bitişik yazılan yeni mp4 dosyasını yükle
        if (isIOS || isMacSafari) {
            video.src = "animasyonios.mp4"; 
            video.load();
        }

        // Sticker Algılama Döngüsü
        hedef.addEventListener("targetFound", event => { video.play(); });
        hedef.addEventListener("targetLost", event => { video.pause(); });

        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];
        
        const mergeCanvas = document.createElement('canvas');

        let drawLoop;

          if (!isRecording) {
            startRecording();
          } else {
            stopRecording();
          }
        });
